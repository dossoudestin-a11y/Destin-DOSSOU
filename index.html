  <!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ELI10 Bike Dash</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;touch-action:none}
  body{background:#0f1117;color:#fff;font-family:system-ui;overflow:hidden}
  canvas{display:block;background:linear-gradient(#87CEEB 0%, #87CEEB 70%, #3CB371 70%)}
  #ui{position:absolute;top:10px;left:0;right:0;text-align:center;pointer-events:none}
  #score{font-size:28px;font-weight:800;text-shadow:2px 2px #000}
  #start{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#25D366;color:#000;border:none;padding:20px 40px;border-radius:16px;font-size:20px;font-weight:800;cursor:pointer}
</style>
</head>
<body>
  <div id="ui"><div id="score">Score: 0</div></div>
  <button id="start">🚴 JOUER</button>
  <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const startBtn = document.getElementById('start');

let W, H, bike, obstacles, score, speed, playing, lastTime;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function reset(){
  bike = {x: W*0.2, y: H*0.75, vy: 0, jumping: false};
  obstacles = [];
  score = 0;
  speed = 6;
  playing = true;
  lastTime = 0;
  startBtn.style.display = 'none';
}

function jump(){
  if(!bike.jumping){
    bike.vy = -15;
    bike.jumping = true;
  }
}

canvas.addEventListener('touchstart', jump);
canvas.addEventListener('click', jump);
document.addEventListener('keydown', e => {if(e.code==='Space') jump()});

function spawnObstacle(){
  const size = 30 + Math.random()*20;
  obstacles.push({x: W, y: H*0.75 - size + 30, w: size, h: size});
}

function drawBike(){
  ctx.save();
  ctx.translate(bike.x, bike.y);

  // Roues
  ctx.fillStyle = '#111';
  ctx.beginPath();ctx.arc(-15, 15, 12, 0, Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(15, 15, 12, 0, Math.PI*2);ctx.fill();

  // Cadre vélo
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-15,15); ctx.lineTo(0,0); ctx.lineTo(15,15); ctx.lineTo(0,0); ctx.lineTo(-5,-10);
  ctx.stroke();

  // Tête
  ctx.fillStyle = '#a855f7';
  ctx.beginPath();ctx.arc(-5,-20,8,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

function drawObstacle(o){
  ctx.fillStyle = '#ff4757';
  ctx.fillRect(o.x, o.y, o.w, o.h);
  ctx.fillStyle = '#000';
  ctx.font = '20px Arial';
  ctx.fillText('!', o.x+o.w/2-4, o.y+o.h/2+6);
}

function loop(time){
  if(!playing) return;
  const dt = time - lastTime;
  lastTime = time;

  ctx.clearRect(0,0,W,H);

  // Sol qui bouge
  ctx.fillStyle = '#2f2f2f';
  for(let i=0; i<W; i+=40){
    ctx.fillRect((i - time*0.1 % 40), H*0.75, 20, 5);
  }

  // Physique vélo
  bike.vy += 0.8;
  bike.y += bike.vy;
  if(bike.y >= H*0.75){
    bike.y = H*0.75;
    bike.vy = 0;
    bike.jumping = false;
  }

  // Spawn obstacles
  if(Math.random() < 0.02) spawnObstacle();

  // Update obstacles
  for(let i=obstacles.length-1; i>=0; i--){
    let o = obstacles[i];
    o.x -= speed;
    drawObstacle(o);

    // Collision
    if(o.x < bike.x+10 && o.x+o.w > bike.x-10 && bike.y+10 > o.y){
      playing = false;
      startBtn.innerText = '💥 Score: ' + score + ' | REJOUER';
      startBtn.style.display = 'block';
    }

    if(o.x < -50) {
      obstacles.splice(i,1);
      score++;
      if(score%5===0) speed += 0.5;
    }
  }

  drawBike();
  scoreEl.innerText = 'Score: ' + score;
  requestAnimationFrame(loop);
}

startBtn.onclick = () => {reset(); requestAnimationFrame(loop);};
</script>
</body>
</html>
    
  </body>
  
</html>

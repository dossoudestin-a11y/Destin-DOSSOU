<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testé | L'IA qui code pour toi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d17; --card:#141428; --text:#f1f1f1; --muted:#a0a0b5; --accent:#00d9ff; --accent-2:#7f5af0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Poppins', sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex; flex-direction:column; height:100vh;
  }
  /* Fond de GRAND CLASSE comme tu veux */
  body::before{
    content:''; position:fixed; top:0; left:0; width:100%; height:100%;
    background: 
      radial-gradient(800px circle at 10% 20%, #00d9ff1a, transparent),
      radial-gradient(600px circle at 90% 80%, #7f5af01a, transparent),
      linear-gradient(180deg, var(--bg) 0%, #0a0a12 100%);
    z-index:-1;
    animation:move 20s infinite alternate;
  }
  @keyframes move{0%{transform:scale(1)}100%{transform:scale(1.1)}}

  header{
    padding:20px 30px; border-bottom:1px solid #222;
    display:flex; align-items:center; gap:15px;
  }
  .avatar{
    width:50px; height:50px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:20px; letter-spacing:1px;
    box-shadow:0 0 20px #7f5af055;
  }
  header h1{font-size:22px}
  header p{color:var(--muted); font-size:13px}

  main{
    flex:1; display:flex; gap:20px; padding:20px;
    max-width:1400px; margin:0 auto; width:100%;
  }
  
  .chat-box{
    flex:1; background:var(--card); border-radius:20px;
    display:flex; flex-direction:column; border:1px solid #222;
  }
  .messages{
    flex:1; padding:20px; overflow-y:auto;
  }
  .msg{
    margin-bottom:15px; padding:12px 16px; border-radius:14px;
    max-width:85%; line-height:1.6; font-size:15px;
  }
  .msg.user{background:var(--accent-2); margin-left:auto; color:#fff}
  .msg.teste{background:#222; border:1px solid #333}
  .msg.teste strong{color:var(--accent)}
  
  .input-area{
    padding:15px; border-top:1px solid #222; display:flex; gap:10px;
  }
  .input-area textarea{
    flex:1; background:#0d0d17; border:1px solid #333; 
    border-radius:12px; padding:12px; color:var(--text);
    resize:none; font-family:inherit; font-size:15px;
  }
  .btn-send{
    background:var(--accent); border:none; color:#000;
    padding:0 24px; border-radius:12px; font-weight:700;
    cursor:pointer; transition:0.3s;
  }
  .btn-send:hover{background:var(--accent-2); color:#fff}

  .code-box{
    flex:1.2; background:var(--card); border-radius:20px;
    display:flex; flex-direction:column; border:1px solid #222;
  }
  .code-header{
    padding:15px 20px; border-bottom:1px solid #222;
    display:flex; justify-content:space-between; align-items:center;
  }
  .code-header h3{color:var(--accent)}
  .btn-copy{
    background:#333; border:none; color:var(--text);
    padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px;
    transition:0.3s;
  }
  .btn-copy:hover{background:var(--accent-2)}
  #codeOutput{
    flex:1; padding:20px; background:#0d0d17; 
    color:#00ff88; font-family:'Courier New', monospace;
    font-size:14px; overflow:auto; white-space:pre;
  }

  @media(max-width:900px){main{flex-direction:column}}
</style>
</head>
<body>

  <header>
    <div class="avatar">T</div>
    <div>
      <h1>Testé</h1>
      <p>Décris ton idée. Je code à ta place.</p>
    </div>
  </header>

  <main>
    <div class="chat-box">
      <div class="messages" id="messages">
        <div class="msg teste">
          <strong>Testé:</strong> Yo Destin 😎 Moi c’est Testé. 
          <br><br>Balance-moi ton idée en français. Ex: 
          <br>→ `Fais-moi un site portfolio avec un fond noir`
          <br>→ `Crée un jeu du serpent simple`
          <br>→ `Fais une boutique de chaussures`
        </div>
      </div>
      <div class="input-area">
        <textarea id="userInput" rows="2" placeholder="Décris ton site ou ton projet ici..."></textarea>
        <button class="btn-send" onclick="sendMessage()">Envoyer</button>
      </div>
    </div>

    <div class="code-box">
      <div class="code-header">
        <h3>Code généré par Testé</h3>
        <button class="btn-copy" onclick="copyCode()">📋 Copier</button>
      </div>
      <div id="codeOutput">// En attente de ton idée...</div>
    </div>
  </main>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const codeEl = document.getElementById('codeOutput');

// Cerveau de Testé
function generateCode(prompt){
  prompt = prompt.toLowerCase();

  if(prompt.includes('portfolio') || prompt.includes('site perso') || prompt.includes('cv')){
    return `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
<style>
  body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#0a0a0f,#141428);color:#fff;text-align:center;padding:120px 20px}
  h1{font-size:52px;background:linear-gradient(90deg,#00d9ff,#7f5af0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  p{color:#aaa;font-size:18px;margin-top:15px}
  .btn{background:#7f5af0;color:#fff;padding:14px 28px;border-radius:12px;text-decoration:none;display:inline-block;margin-top:30px;font-weight:700;transition:0.3s}
  .btn:hover{transform:translateY(-3px);box-shadow:0 10px 20px #7f5af055}
</style>
</head>
<body>
  <h1>Je suis Destin</h1>
  <p>Développeur & Créateur | Abomey-Calavi</p>
  <a href="#" class="btn">Voir mes Projets</a>
</body>
</html>`;
  }

  if(prompt.includes('jeu') || prompt.includes('serpent')){
    return `<!DOCTYPE html>
<html>
<body style="margin:0;background:#0a0a0f;display:flex;justify-content:center;align-items:center;height:100vh">
<canvas id="g" width="400" height="400" style="border:2px solid #7f5af0;border-radius:12px"></canvas>
<script>
const c=document.getElementById('g'),x=c.getContext('2d');
let s=[{x:200,y:200}],d={x:20,y:0},f={x:100,y:100};
document.onkeydown=e=>{if(e.key=='ArrowUp'&&d.y==0)d={x:0,y:-20};if(e.key=='ArrowDown'&&d.y==0)d={x:0,y:20};if(e.key=='ArrowLeft'&&d.x==0)d={x:-20,y:0};if(e.key=='ArrowRight'&&d.x==0)d={x:20,y:0}};
setInterval(()=>{s.unshift({x:s[0].x+d.x,y:s[0].y+d.y});if(s[0].x==f.x&&s[0].y==f.y)f={x:Math.floor(Math.random()*20)*20,y:Math.floor(Math.random()*20)*20};else s.pop();
x.fillStyle='#0a0a0f';x.fillRect(0,0,400,400);x.fillStyle='#00d9ff';s.forEach(p=>x.fillRect(p.x,p.y,20,20));x.fillStyle='#7f5af0';x.fillRect(f.x,f.y,20,20);},100);
<\/script>
</body>
</html>`;
  }

  if(prompt.includes('boutique') || prompt.includes('vente') || prompt.includes('chaussure') || prompt.includes('shop')){
    return `<!DOCTYPE html>
<html lang="fr">
<head>
<title>Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:Poppins;background:#0a0a0f;margin:0;color:#fff}
  header{background:linear-gradient(90deg,#00d9ff,#7f5af0);color:#fff;padding:30px;text-align:center}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;padding:40px;max-width:1200px;margin:auto}
  .card{background:#141428;padding:20px;border-radius:16px;border:1px solid #222;transition:0.3s}
  .card:hover{transform:translateY(-5px);border-color:#7f5af0}
  .card img{width:100%;border-radius:12px}
  .btn{background:#00d9ff;border:none;padding:12px 20px;border-radius:10px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;color:#000}
</style>
</head>
<body>
<header><h1>Ma Boutique 🔥</h1></header>
<div class="grid">
  <div class="card"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"><h3>Basket Rouge</h3><p>25 000 FCFA</p><button class="btn">Acheter</button></div>
  <div class="card"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"><h3>Basket Rouge</h3><p>25 000 FCFA</p><button class="btn">Acheter</button></div>
  <div class="card"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"><h3>Basket Rouge</h3><p>25 000 FCFA</p><button class="btn">Acheter</button></div>
</div>
</body>
</html>`;
  }

  // Par défaut
  return `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mon Site</title>
<style>
  body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#0a0a0f,#141428);color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;text-align:center}
  h1{font-size:40px;background:linear-gradient(90deg,#00d9ff,#7f5af0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body>
  <div>
    <h1>Site généré par Testé</h1>
    <p>Décris-moi mieux ton idée pour un meilleur code 😉</p>
  </div>
</body>
</html>`;
}

function sendMessage(){
  const text = inputEl.value.trim();
  if(!text) return;

  addMsg(text, 'user');
  inputEl.value = '';

  setTimeout(() => {
    addMsg(`Ok Destin, je génère le code pour : "${text}"`, 'teste');
    const code = generateCode(text);
    codeEl.textContent = code;
  }, 800);
}

function addMsg(text, who){
  const div = document.createElement('div');
  div.className = 'msg ' + who;
  div.innerHTML = `<strong>${who==='teste'?'Testé:':'Toi:'}</strong> ${text}`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function copyCode(){
  navigator.clipboard.writeText(codeEl.textContent);
  alert('Code copié ! Colle-le dans un fichier .html');
}

inputEl.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
